  <!-- Crown -->
  <g fill="none" stroke="#D1A43C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- base -->
    <path d="M36 32 Q50 28 64 32"/>
    <path d="M37 31 Q38 21 44 28"/>
    <path d="M44 28 Q50 15 50 21"/>
    <path d="M50 21 Q50 15 56 28"/>
