    <rect x="41.5" y="59" width="3.5" height="6" rx="0.5" fill="#D1A43C"/>
    <rect x="47" y="55" width="3.5" height="10" rx="0.5" fill="#D1A43C"/>
    <rect x="52.5" y="50" width="3.5" height="15" rx="0.5" fill="#D1A43C"/>
    <!-- handle -->
